appId: com.rudi109.musicfinder
productName: MusicFinder
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: bin/yt-dlp.exe
    to: bin/yt-dlp.exe
# settings.json 은 동봉하지 않는다. 앱이 첫 실행 때 없으면 생성하고, 이후 재배포는 건드리지 않는다.
win:
  # Linux 에서 wine 없이 빌드하기 위해 unpacked 폴더(dir) 산출 +
  # exe 메타데이터 편집/서명(wine 필요) 비활성. 단일 portable exe 는 Windows/CI/wine 에서.
  target:
    - dir
  signAndEditExecutable: false
