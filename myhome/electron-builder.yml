appId: com.nwork.familyhub
productName: FamilyHub
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: bin/yt-dlp.exe
    to: bin/yt-dlp.exe
# settings.json 은 동봉하지 않는다. 앱이 첫 실행 때 없으면 생성하고, 이후 재배포는 건드리지 않는다.
win:
  icon: build/icon.ico
  signAndEditExecutable: false
