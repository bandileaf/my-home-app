name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.0.2)'
        required: true
        default: 'v0.0.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version from tag
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          $ver = $tag.TrimStart('v')
          $replace = '"version": "' + $ver + '"'
          (Get-Content myhome\package.json) -replace '"version": "[^"]*"', $replace | Set-Content myhome\package.json

      - name: Install myhome dependencies
        run: npm ci
        working-directory: myhome

      - name: Install familyhub dependencies
        run: npm ci
        working-directory: familyhub

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path myhome\bin
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "myhome\bin\yt-dlp.exe"

      - name: Build myhome app
        run: npx electron-vite build
        working-directory: myhome

      - name: Package myhome (portable)
        run: npx electron-builder --win portable --publish never
        working-directory: myhome

      - name: Build familyhub
        run: npm run build
        working-directory: familyhub

      - name: Patch settings.json
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          $json = Get-Content settings.json | ConvertFrom-Json
          $json.'hub.tag' = $tag
          $json.'hub.app.myhome' = "myhome_${tag}.exe"
          $json | ConvertTo-Json | Out-File settings.json -Encoding utf8NoBOM

      - name: Remove intermediate build folder
        run: Remove-Item -Recurse -Force myhome\dist\win-unpacked -ErrorAction SilentlyContinue

      - name: Bundle zip
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          $myhomeExe = Get-ChildItem myhome\dist\myhome_v*.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path bundle
          Copy-Item $myhomeExe.FullName bundle\
          Copy-Item familyhub\dist\familyhub.exe bundle\
          Copy-Item settings.json bundle\
          Compress-Archive -Path bundle\* -DestinationPath "familyhub_${tag}.zip"

      - name: Upload to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            familyhub_v*.zip
            myhome/dist/myhome_v*.exe
            familyhub/dist/familyhub.exe
            settings.json
          generate_release_notes: true
