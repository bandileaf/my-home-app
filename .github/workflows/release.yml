name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Install launcher dependencies
        run: npm ci
        working-directory: launcher

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"

      - name: Build app
        run: npx electron-vite build

      - name: Package app (portable)
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build launcher
        run: npm run build
        working-directory: launcher

      - name: Create version.txt
        run: echo ${{ github.ref_name }} > dist/version.txt

      - name: Remove intermediate build folder
        run: Remove-Item -Recurse -Force dist\win-unpacked -ErrorAction SilentlyContinue

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/version.txt
          generate_release_notes: true
