name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install myhome dependencies
        run: npm ci
        working-directory: myhome

      - name: Install familyhub dependencies
        run: npm ci
        working-directory: familyhub

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path myhome\bin
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "myhome\bin\yt-dlp.exe"

      - name: Build myhome app
        run: npx electron-vite build
        working-directory: myhome

      - name: Package myhome (portable)
        run: npx electron-builder --win portable
        working-directory: myhome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build familyhub launcher
        run: npm run build
        working-directory: familyhub

      - name: Create version.txt
        run: echo ${{ github.ref_name }} > myhome\dist\version.txt

      - name: Remove intermediate build folder
        run: Remove-Item -Recurse -Force myhome\dist\win-unpacked -ErrorAction SilentlyContinue

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myhome/dist/*.exe
            myhome/dist/version.txt
            familyhub/dist/launcher.exe
          generate_release_notes: true
