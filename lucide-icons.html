<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1e1e2e; color: #cdd6f4; font-family: sans-serif; }
  header { position: sticky; top: 0; z-index: 10; background: #181825; padding: 12px 16px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #313244; }
  header h1 { font-size: 15px; color: #cba6f7; white-space: nowrap; }
  header input { flex: 1; padding: 6px 10px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; font-size: 13px; outline: none; }
  header input:focus { border-color: #cba6f7; }
  #count { font-size: 12px; color: #6c7086; white-space: nowrap; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 4px; padding: 12px; }
  .icon-card { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 6px 8px; border-radius: 8px; cursor: pointer; transition: background 0.1s; }
  .icon-card:hover { background: #313244; }
  .icon-card svg { width: 22px; height: 22px; stroke: #cdd6f4; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .icon-card span { font-size: 10px; color: #6c7086; text-align: center; line-height: 1.3; word-break: break-word; }
  .icon-card:hover span { color: #a6adc8; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #cba6f7; color: #1e1e2e; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
</style>

function render(items) {
  grid.innerHTML = '';
  items.forEach(({ name, kebab }) => {
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.innerHTML = '<i data-lucide="' + kebab + '"></i><span>' + name + '</span>';
    card.onclick = () => {
      navigator.clipboard.writeText(name).then(() => showToast('Copied: ' + name));
    };
    grid.appendChild(card);
  });
  if (window.lucide) lucide.createIcons();
}

render(ICONS);
searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase();
  const filtered = q ? ICONS.filter(i => i.name.toLowerCase().includes(q) || i.kebab.includes(q)) : ICONS;
  render(filtered);
});
</script>
</body>
</html>
